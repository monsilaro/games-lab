<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Emprise" />
    <meta name="theme-color" content="#05070d" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="icon" href="./apple-touch-icon.png" />
    <title>Emprise</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #05070d;
        color: #e8edf2;
        font-family: -apple-system, system-ui, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      canvas#emprise-game-canvas {
        position: fixed;
        inset: 0;
        display: block;
        touch-action: none;
        z-index: 0;
      }

      /* Top HUD bar (safe-area aware). */
      .emprise-hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        display: flex;
        justify-content: center;
        gap: 10px;
        padding: calc(env(safe-area-inset-top, 0px) + 10px) 12px 10px;
        pointer-events: none;
      }
      .emprise-stat {
        background: rgba(10, 17, 40, 0.72);
        border: 1px solid rgba(255, 159, 28, 0.22);
        border-radius: 12px;
        padding: 6px 12px;
        min-width: 78px;
        text-align: center;
        backdrop-filter: blur(6px);
      }
      .emprise-stat .emprise-label {
        display: block;
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #7d8aa5;
      }
      .emprise-stat .emprise-value {
        display: block;
        font-size: 19px;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        color: #ffd166;
      }
      #emprise-hud-percent {
        color: #ff9f1c;
      }
      #emprise-hud-fps {
        color: #caf0f8;
      }

      /* First-run hint, fades out on first touch. */
      .emprise-hint {
        position: fixed;
        left: 50%;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 40px);
        transform: translateX(-50%);
        z-index: 10;
        padding: 10px 18px;
        background: rgba(10, 17, 40, 0.72);
        border: 1px solid rgba(202, 240, 248, 0.18);
        border-radius: 999px;
        font-size: 14px;
        color: #caf0f8;
        white-space: nowrap;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }
      .emprise-hint-hidden {
        opacity: 0;
      }

      /* Round-end overlay (win + game-over), hidden by default. */
      .emprise-end {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 24px;
        text-align: center;
        background: rgba(5, 7, 13, 0.82);
        backdrop-filter: blur(6px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.35s ease;
      }
      .emprise-end.emprise-end-active {
        opacity: 1;
        pointer-events: auto;
      }
      .emprise-end h2 {
        font-size: 34px;
        font-weight: 800;
        letter-spacing: 1px;
        color: #ffd166;
      }
      .emprise-end p {
        font-size: 16px;
        color: #9fb0cc;
        max-width: 280px;
        line-height: 1.5;
      }
      #emprise-restart-btn {
        margin-top: 6px;
        padding: 12px 30px;
        font: inherit;
        font-size: 17px;
        font-weight: 700;
        color: #05070d;
        background: #ff9f1c;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      #emprise-restart-btn:active {
        transform: scale(0.97);
        background: #ffd166;
      }

      #emprise-build-stamp {
        position: fixed;
        z-index: 5;
        right: calc(env(safe-area-inset-right, 0px) + 8px);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 6px);
        font-size: 10px;
        font-family: ui-monospace, monospace;
        color: rgba(125, 138, 165, 0.5);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="emprise-game-canvas"></canvas>

    <div class="emprise-hud">
      <div class="emprise-stat">
        <span class="emprise-label">Balance</span>
        <span class="emprise-value" id="emprise-hud-balance">0</span>
      </div>
      <div class="emprise-stat">
        <span class="emprise-label">Territoire</span>
        <span class="emprise-value" id="emprise-hud-percent">0%</span>
      </div>
      <div class="emprise-stat">
        <span class="emprise-label">Rivaux</span>
        <span class="emprise-value" id="emprise-hud-rivals">0</span>
      </div>
      <div class="emprise-stat">
        <span class="emprise-label">FPS</span>
        <span class="emprise-value" id="emprise-hud-fps">60</span>
      </div>
    </div>

    <div class="emprise-hint" id="emprise-hint">Touche et glisse pour t'étendre</div>

    <div class="emprise-end" id="emprise-end-overlay">
      <h2 id="emprise-end-title">Conquis</h2>
      <p id="emprise-end-sub">Ton territoire a été englouti.</p>
      <button id="emprise-restart-btn">Rejouer</button>
    </div>

    <div id="emprise-build-stamp"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
