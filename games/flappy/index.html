<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flappy" />
    <meta name="theme-color" content="#4ec0ca" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="icon" href="./apple-touch-icon.png" />
    <title>Flappy</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #4ec0ca;
        font-family: -apple-system, system-ui, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      canvas {
        position: fixed;
        inset: 0;
        display: block;
        touch-action: none;
        z-index: 0;
      }
      #flappy-hud-score {
        position: fixed;
        z-index: 10;
        top: calc(env(safe-area-inset-top, 0px) + 16px);
        left: 0;
        right: 0;
        text-align: center;
        font-size: 56px;
        font-weight: 800;
        color: #fff;
        text-shadow: 0 3px 0 rgba(0, 0, 0, 0.25);
        pointer-events: none;
        display: none;
      }
      #flappy-game-overlay {
        position: fixed;
        z-index: 10;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: calc(env(safe-area-inset-top, 0px) + 16px) 16px
          calc(env(safe-area-inset-bottom, 0px) + 16px);
        text-align: center;
        color: #fff;
        text-shadow: 0 3px 0 rgba(0, 0, 0, 0.25);
        pointer-events: none;
      }
      #flappy-game-overlay h1 {
        font-size: 44px;
        font-weight: 800;
      }
      #flappy-game-overlay p {
        font-size: 20px;
        font-weight: 600;
      }
      #flappy-build-stamp {
        position: fixed;
        z-index: 10;
        right: calc(env(safe-area-inset-right, 0px) + 8px);
        top: calc(env(safe-area-inset-top, 0px) + 8px);
        font-size: 10px;
        color: rgba(255, 255, 255, 0.55);
        pointer-events: none;
      }
      #flappy-hud-score.pop {
        animation: scorePop 0.25s ease-out;
      }
      @keyframes scorePop {
        0% {
          transform: scale(1);
        }
        40% {
          transform: scale(1.35);
        }
        100% {
          transform: scale(1);
        }
      }
      #flappy-death-flash {
        position: fixed;
        inset: 0;
        background: #fff;
        opacity: 0;
        pointer-events: none;
        z-index: 20;
      }
      /* Leaderboard button: the only interactive element on the game-over
         screen. It stops the tap from reaching the window "tap to restart". */
      #flappy-leaderboard-btn {
        position: fixed;
        z-index: 15;
        left: 50%;
        transform: translateX(-50%);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 28px);
        display: none;
        pointer-events: auto;
        appearance: none;
        border: 0;
        cursor: pointer;
        padding: 12px 22px;
        border-radius: 10px;
        font-family: inherit;
        font-size: 17px;
        font-weight: 800;
        color: #0a1128;
        background: #ffd166;
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.25);
      }
    </style>
  </head>
  <body>
    <div id="flappy-death-flash"></div>
    <div id="flappy-hud-score">0</div>
    <div id="flappy-build-stamp"></div>
    <div id="flappy-game-overlay">
      <h1>Flappy</h1>
      <p>Tap to play</p>
    </div>
    <button id="flappy-leaderboard-btn" type="button">🏆 Classement</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
