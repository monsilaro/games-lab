<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Slingshot" />
    <meta name="theme-color" content="#fff4e2" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="icon" href="./apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />
    <title>Slingshot</title>
    <style>
      /* Papercraft chrome: warm cream paper cards, rounded, soft layered shadow.
         Tokens: card #fff7ec · border rgba(120,80,40,.12) · text #5a3d22 ·
         muted #7a5230 · accent teal #1f9d8f · ball/title #ef6f51 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #fff4e2;
        color: #5a3d22;
        font-family: 'Baloo 2', -apple-system, system-ui, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      canvas {
        position: fixed;
        inset: 0;
        display: block;
        touch-action: none;
        z-index: 0;
      }

      /* --- HUD ------------------------------------------------------------ */
      #slingshot-hud {
        position: fixed;
        z-index: 10;
        top: calc(env(safe-area-inset-top, 0px) + 10px);
        left: calc(env(safe-area-inset-left, 0px) + 14px);
        right: calc(env(safe-area-inset-right, 0px) + 14px);
        display: none;
        align-items: center;
        gap: 10px;
        font-size: 15px;
        font-weight: 700;
        pointer-events: none;
      }
      #slingshot-level-label,
      #slingshot-score-label {
        padding: 5px 12px;
        border-radius: 12px;
        background: #fff7ec;
        border: 1px solid rgba(120, 80, 40, 0.12);
        color: #5a3d22;
        box-shadow: 0 3px 0 rgba(120, 80, 40, 0.12), 0 6px 14px rgba(120, 80, 40, 0.12);
      }
      #slingshot-shots {
        flex: 1;
        display: flex;
        justify-content: center;
        gap: 7px;
      }
      .slingshot-shot-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #ef6f51;
        box-shadow: 0 2px 0 rgba(120, 80, 40, 0.18);
      }
      .slingshot-shot-dot.spent {
        background: rgba(120, 80, 40, 0.18);
        box-shadow: none;
      }

      /* --- Score pop ---------------------------------------------------------- */
      #slingshot-score-pop {
        position: fixed;
        z-index: 10;
        top: 22%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 32px;
        font-weight: 800;
        color: #1f9d8f;
        text-shadow: 0 2px 0 rgba(255, 255, 255, 0.6);
        opacity: 0;
        pointer-events: none;
      }
      #slingshot-score-pop.show {
        animation: slingshotPopIn 1.1s ease-out;
      }
      @keyframes slingshotPopIn {
        0% { opacity: 0; transform: translateY(12px) scale(0.85); }
        15% { opacity: 1; transform: translateY(0) scale(1.08); }
        30% { transform: scale(1); }
        70% { opacity: 1; }
        100% { opacity: 0; transform: translateY(-14px); }
      }

      /* --- Star rating (level clear) ------------------------------------------ */
      #slingshot-stars {
        position: fixed;
        z-index: 11;
        top: 33%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 50px;
        letter-spacing: 8px;
        color: #f4a261;
        text-shadow: 0 3px 0 rgba(255, 255, 255, 0.7);
        opacity: 0;
        pointer-events: none;
      }
      #slingshot-stars.show {
        animation: slingshotStarsIn 1.6s ease-out;
      }
      @keyframes slingshotStarsIn {
        0% { opacity: 0; transform: scale(0.4); }
        20% { opacity: 1; transform: scale(1.15); }
        35% { transform: scale(1); }
        80% { opacity: 1; }
        100% { opacity: 0; transform: scale(1); }
      }

      /* --- Next-shot button --------------------------------------------------- */
      #slingshot-next-btn {
        position: fixed;
        z-index: 12;
        left: 50%;
        transform: translateX(-50%);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
        display: none;
        padding: 10px 20px;
        border: 1px solid rgba(120, 80, 40, 0.12);
        border-radius: 14px;
        background: #fff7ec;
        color: #1f9d8f;
        font: inherit;
        font-size: 16px;
        font-weight: 700;
        box-shadow: 0 4px 0 rgba(120, 80, 40, 0.12), 0 8px 18px rgba(120, 80, 40, 0.14);
      }
      #slingshot-next-btn:active {
        transform: translateX(-50%) translateY(2px) scale(0.98);
        box-shadow: 0 2px 0 rgba(120, 80, 40, 0.12);
      }

      /* --- Overlay -------------------------------------------------------------- */
      #slingshot-game-overlay {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: calc(env(safe-area-inset-top, 0px) + 16px) 16px
          calc(env(safe-area-inset-bottom, 0px) + 16px);
        text-align: center;
        background: rgba(255, 244, 226, 0.55);
        pointer-events: none;
      }
      #slingshot-game-overlay h1 {
        font-size: 46px;
        font-weight: 800;
        color: #ef6f51;
        text-shadow: 0 3px 0 rgba(255, 255, 255, 0.75);
      }
      #slingshot-game-overlay p {
        font-size: 18px;
        font-weight: 600;
        color: #7a5230;
      }

      #slingshot-build-stamp {
        position: fixed;
        z-index: 10;
        right: calc(env(safe-area-inset-right, 0px) + 8px);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 6px);
        font-size: 10px;
        color: rgba(120, 80, 40, 0.4);
        pointer-events: none;
      }
      /* Leaderboard button: only interactive element on the game-over screen;
         z-index above the overlay (20), stops the tap from restarting. */
      #slingshot-leaderboard-btn {
        position: fixed;
        z-index: 30;
        left: 50%;
        transform: translateX(-50%);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 28px);
        display: none;
        pointer-events: auto;
        appearance: none;
        border: 0;
        cursor: pointer;
        padding: 12px 22px;
        border-radius: 14px;
        font-family: inherit;
        font-size: 17px;
        font-weight: 800;
        color: #fff6e9;
        background: #1f9d8f;
        box-shadow: 0 4px 0 rgba(120, 80, 40, 0.22), 0 8px 18px rgba(120, 80, 40, 0.18);
      }
      #slingshot-leaderboard-btn:active {
        transform: translateX(-50%) translateY(2px);
        background: #15786d;
        box-shadow: 0 2px 0 rgba(120, 80, 40, 0.22);
      }
    </style>
  </head>
  <body>
    <div id="slingshot-hud">
      <span id="slingshot-level-label">Level 1</span>
      <div id="slingshot-shots"></div>
      <span id="slingshot-score-label">0</span>
    </div>
    <div id="slingshot-score-pop"></div>
    <div id="slingshot-stars"></div>
    <button type="button" id="slingshot-next-btn">Next shot →</button>
    <div id="slingshot-build-stamp"></div>
    <div id="slingshot-game-overlay"></div>
    <button id="slingshot-leaderboard-btn" type="button">🏆 Classement</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
