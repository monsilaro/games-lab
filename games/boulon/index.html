<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Boulon" />
    <meta name="theme-color" content="#e9edf2" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="icon" href="./apple-touch-icon.png" />
    <title>Boulon</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #e9edf2;
        color: #2a2f3a;
        font-family: -apple-system, system-ui, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      canvas {
        position: fixed;
        inset: 0;
        display: block;
        touch-action: none;
        z-index: 0;
      }

      .boulon-hud {
        position: fixed;
        z-index: 10;
        top: calc(env(safe-area-inset-top, 0px) + 12px);
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        pointer-events: none;
        text-shadow: 0 2px 0 rgba(255, 255, 255, 0.55);
      }
      #boulon-hud-room {
        font-size: 16px;
        font-weight: 900;
        color: #1f5fc0;
        min-width: 70px;
      }
      #boulon-hud-enemies {
        font-size: 15px;
        font-weight: 800;
        color: #c62828;
      }
      #boulon-hud-hp {
        font-size: 15px;
        min-width: 70px;
        text-align: right;
        letter-spacing: 1px;
      }
      #boulon-hud-upgrades {
        position: fixed;
        z-index: 10;
        top: calc(env(safe-area-inset-top, 0px) + 40px);
        left: 0;
        right: 0;
        text-align: center;
        font-size: 16px;
        letter-spacing: 2px;
        pointer-events: none;
      }

      #boulon-banner {
        position: fixed;
        z-index: 11;
        top: 38%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 30px;
        font-weight: 900;
        color: #1f5fc0;
        text-shadow: 0 3px 0 rgba(255, 255, 255, 0.6);
        opacity: 0;
        transition: opacity 0.35s ease;
        pointer-events: none;
      }

      #boulon-hint {
        position: fixed;
        z-index: 10;
        left: 50%;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 36px);
        transform: translateX(-50%);
        padding: 9px 16px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(40, 47, 58, 0.14);
        border-radius: 999px;
        font-size: 13px;
        color: #2a2f3a;
        text-align: center;
        max-width: 86vw;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }

      #boulon-build-stamp {
        position: fixed;
        z-index: 10;
        right: calc(env(safe-area-inset-right, 0px) + 8px);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 6px);
        font-size: 10px;
        font-family: ui-monospace, monospace;
        color: rgba(40, 47, 58, 0.4);
        pointer-events: none;
      }

      .boulon-end {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 24px;
        text-align: center;
        background: rgba(233, 237, 242, 0.86);
        backdrop-filter: blur(6px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.35s ease;
      }
      .boulon-end.boulon-end-active {
        opacity: 1;
        pointer-events: auto;
      }
      .boulon-end h2 {
        font-size: 34px;
        font-weight: 900;
        color: #1f5fc0;
      }
      .boulon-end p {
        font-size: 16px;
        color: #5b6478;
        max-width: 300px;
        line-height: 1.5;
      }
      #boulon-end-score {
        font-size: 28px;
        font-weight: 900;
        font-variant-numeric: tabular-nums;
        color: #2a2f3a;
      }
      .boulon-end-btns {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 6px;
      }
      #boulon-restart-btn {
        padding: 12px 30px;
        font: inherit;
        font-size: 17px;
        font-weight: 800;
        color: #fff;
        background: #2f7fed;
        border: none;
        border-radius: 999px;
        cursor: pointer;
      }
      #boulon-restart-btn:active {
        transform: scale(0.97);
        background: #1f5fc0;
      }
      #boulon-leaderboard-btn {
        padding: 12px 24px;
        font: inherit;
        font-size: 16px;
        font-weight: 800;
        color: #1f5fc0;
        background: transparent;
        border: 2px solid rgba(47, 127, 237, 0.5);
        border-radius: 999px;
        cursor: pointer;
      }
      #boulon-leaderboard-btn:active {
        transform: scale(0.97);
        background: rgba(47, 127, 237, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="boulon-hud">
      <span id="boulon-hud-room">Salle 1</span>
      <span id="boulon-hud-enemies">☠️ 0</span>
      <span id="boulon-hud-hp">🔩🔩🔩🔩🔩</span>
    </div>
    <div id="boulon-hud-upgrades"></div>
    <div id="boulon-banner"></div>
    <div id="boulon-hint">Glisse pour piloter · tir auto · nettoie la salle avant que le sol t'écrase</div>
    <div id="boulon-build-stamp"></div>

    <div class="boulon-end" id="boulon-end-overlay">
      <h2>Game Over</h2>
      <p id="boulon-end-sub">Écrasé !</p>
      <p id="boulon-end-score">Score 0</p>
      <div class="boulon-end-btns">
        <button id="boulon-restart-btn">Rejouer</button>
        <button id="boulon-leaderboard-btn">🏆 Classement</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
