<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Veillée" />
    <meta name="theme-color" content="#0a1128" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="icon" href="./apple-touch-icon.png" />
    <title>Veillée</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #0a1128;
        color: #f4f4f6;
        font-family: -apple-system, system-ui, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      canvas {
        position: fixed;
        inset: 0;
        display: block;
        touch-action: none;
        z-index: 0;
      }

      /* --- Forge name labels (projected from 3D each frame) ------------------ */
      #veillee-forge-labels {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }
      .veillee-hero-label {
        position: absolute;
        top: 0;
        left: 0;
        white-space: nowrap;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: rgba(232, 237, 242, 0.78);
        text-shadow: 0 1px 4px rgba(10, 17, 40, 0.9);
        will-change: transform;
      }
      .veillee-hero-label--sel {
        color: #ff9f1c;
        text-shadow: 0 0 10px rgba(255, 159, 28, 0.8);
      }

      /* --- Trait panel (tap a hero) ------------------------------------------ */
      #veillee-trait-panel {
        position: fixed;
        z-index: 12;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
        width: min(86vw, 420px);
        display: none;
        flex-direction: column;
        gap: 4px;
        padding: 12px 16px;
        border: 1px solid rgba(202, 240, 248, 0.35);
        border-radius: 14px;
        background: rgba(28, 37, 65, 0.88);
        text-align: center;
        opacity: 0;
        transition: opacity 0.18s ease, transform 0.18s ease;
      }
      #veillee-trait-panel.veillee-trait-panel--show {
        display: flex;
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .veillee-trait-name {
        font-size: 19px;
        font-weight: 800;
      }
      .veillee-trait-chips {
        font-size: 13px;
        font-weight: 700;
        color: #2ec4b6;
        letter-spacing: 0.04em;
      }
      .veillee-trait-blurb {
        font-size: 13px;
        font-weight: 500;
        color: rgba(244, 244, 246, 0.78);
      }

      /* --- Placeholder landing (no ?forge param) ----------------------------- */
      #veillee-placeholder {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        text-align: center;
      }
      #veillee-placeholder h1 {
        font-size: 40px;
        font-weight: 800;
        text-shadow: 0 0 24px rgba(46, 196, 182, 0.35);
      }
      #veillee-placeholder p {
        font-size: 16px;
        color: rgba(244, 244, 246, 0.78);
        max-width: 24ch;
      }
      #veillee-placeholder a {
        padding: 12px 22px;
        border: 2px solid rgba(255, 159, 28, 0.7);
        border-radius: 14px;
        background: rgba(255, 159, 28, 0.12);
        color: #ff9f1c;
        font-size: 16px;
        font-weight: 700;
        text-decoration: none;
      }
      #veillee-placeholder a:active {
        transform: scale(0.96);
      }

      #veillee-build-stamp {
        position: fixed;
        z-index: 10;
        right: calc(env(safe-area-inset-right, 0px) + 8px);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 6px);
        font-size: 10px;
        color: rgba(244, 244, 246, 0.4);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="veillee-forge-labels"></div>
    <div id="veillee-trait-panel"></div>
    <div id="veillee-placeholder">
      <h1>🕯️ Veillée</h1>
      <p>Auto-battler du folklore québécois. La forge des héros est ouverte.</p>
      <a href="?forge=1">Ouvrir la Forge →</a>
    </div>
    <div id="veillee-build-stamp"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
