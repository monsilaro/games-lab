<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Veillée" />
    <meta name="theme-color" content="#0a1128" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="icon" href="./apple-touch-icon.png" />
    <title>Veillée</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #0a1128;
        color: #f4f4f6;
        font-family: -apple-system, system-ui, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      canvas {
        position: fixed;
        inset: 0;
        display: block;
        touch-action: none;
        z-index: 0;
      }
      button {
        font: inherit;
        color: inherit;
        cursor: pointer;
      }

      /* ===== Forge (?forge=1) ============================================= */
      #veillee-forge-labels {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }
      .veillee-hero-label {
        position: absolute;
        top: 0;
        left: 0;
        white-space: nowrap;
        font-size: 11px;
        font-weight: 700;
        color: rgba(232, 237, 242, 0.78);
        text-shadow: 0 1px 4px rgba(10, 17, 40, 0.9);
        will-change: transform;
      }
      .veillee-hero-label--sel {
        color: #ff9f1c;
        text-shadow: 0 0 10px rgba(255, 159, 28, 0.8);
      }
      #veillee-trait-panel {
        position: fixed;
        z-index: 12;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
        width: min(86vw, 420px);
        display: none;
        flex-direction: column;
        gap: 4px;
        padding: 12px 16px;
        border: 1px solid rgba(202, 240, 248, 0.35);
        border-radius: 14px;
        background: rgba(28, 37, 65, 0.88);
        text-align: center;
        opacity: 0;
        transition: opacity 0.18s ease, transform 0.18s ease;
      }
      #veillee-trait-panel.veillee-trait-panel--show {
        display: flex;
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .veillee-trait-name {
        font-size: 19px;
        font-weight: 800;
      }
      .veillee-trait-chips {
        font-size: 13px;
        font-weight: 700;
        color: #2ec4b6;
        letter-spacing: 0.04em;
      }
      .veillee-trait-blurb {
        font-size: 13px;
        font-weight: 500;
        color: rgba(244, 244, 246, 0.78);
      }

      /* ===== Game HUD ===================================================== */
      #veillee-hud {
        position: fixed;
        z-index: 10;
        top: calc(env(safe-area-inset-top, 0px) + 8px);
        left: calc(env(safe-area-inset-left, 0px) + 8px);
        right: calc(env(safe-area-inset-right, 0px) + 8px);
        display: none; /* shown by the game HUD; stays hidden in forge mode */
        justify-content: center;
        flex-wrap: wrap;
        gap: 6px;
        pointer-events: none;
      }
      .veillee-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 5px 10px;
        border-radius: 11px;
        background: rgba(28, 37, 65, 0.8);
        font-size: 13px;
        font-weight: 700;
      }
      /* Live synergy panel (left side) */
      #veillee-synergies {
        position: fixed;
        z-index: 10;
        left: calc(env(safe-area-inset-left, 0px) + 8px);
        top: calc(env(safe-area-inset-top, 0px) + 46px);
        display: none;
        flex-direction: column;
        gap: 5px;
        max-width: 44vw;
        pointer-events: none;
      }
      .veillee-syn {
        display: flex;
        flex-direction: column;
        gap: 1px;
        padding: 4px 8px;
        border-radius: 9px;
        background: rgba(28, 37, 65, 0.55);
        opacity: 0.5;
      }
      .veillee-syn--on {
        opacity: 1;
        background: rgba(46, 196, 182, 0.22);
        box-shadow: 0 0 0 1px rgba(46, 196, 182, 0.5) inset;
      }
      .veillee-syn-head {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 700;
      }
      .veillee-syn-count {
        margin-left: auto;
        font-size: 11px;
        color: #caf0f8;
      }
      .veillee-syn-desc {
        font-size: 10px;
        font-weight: 600;
        color: rgba(202, 240, 248, 0.85);
      }

      #veillee-phase {
        position: fixed;
        z-index: 10;
        top: 18%;
        left: 0;
        right: 0;
        display: none;
        text-align: center;
        font-size: 26px;
        font-weight: 800;
        color: #caf0f8;
        text-shadow: 0 0 16px rgba(202, 240, 248, 0.5);
        pointer-events: none;
      }

      /* Win/lose banner */
      #veillee-banner {
        position: fixed;
        z-index: 15;
        top: 34%;
        left: 0;
        right: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }
      #veillee-banner.veillee-banner--show {
        opacity: 1;
      }
      #veillee-banner strong {
        font-size: 40px;
        font-weight: 800;
        text-shadow: 0 0 22px rgba(46, 196, 182, 0.5);
      }
      #veillee-banner span {
        font-size: 16px;
        color: rgba(244, 244, 246, 0.85);
      }

      /* Shop bar */
      #veillee-shop {
        position: fixed;
        z-index: 12;
        left: 0;
        right: 0;
        bottom: 0;
        display: none;
        flex-direction: column;
        gap: 8px;
        padding: 10px calc(env(safe-area-inset-right, 0px) + 10px)
          calc(env(safe-area-inset-bottom, 0px) + 10px) calc(env(safe-area-inset-left, 0px) + 10px);
        background: linear-gradient(to top, rgba(10, 17, 40, 0.92), rgba(10, 17, 40, 0.6));
      }
      #veillee-shop-offers {
        display: flex;
        gap: 8px;
      }
      .veillee-offer {
        flex: 1;
        min-height: 56px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        padding: 6px 4px;
        border: 1px solid rgba(202, 240, 248, 0.3);
        border-radius: 12px;
        background: rgba(28, 37, 65, 0.9);
      }
      .veillee-offer:active {
        transform: scale(0.96);
      }
      .veillee-offer--poor {
        opacity: 0.45;
      }
      .veillee-offer--empty {
        opacity: 0.18;
        border-style: dashed;
      }
      .veillee-offer-name {
        font-size: 13px;
        font-weight: 700;
        text-align: center;
        line-height: 1.1;
      }
      .veillee-offer-traits {
        font-size: 14px;
        letter-spacing: 2px;
      }
      .veillee-offer-cost {
        font-size: 12px;
        font-weight: 700;
        color: #ffd166;
      }
      #veillee-shop-actions {
        display: flex;
        gap: 8px;
      }
      #veillee-shop-actions button {
        flex: 1;
        padding: 11px;
        border-radius: 12px;
        border: 2px solid rgba(202, 240, 248, 0.4);
        background: rgba(28, 37, 65, 0.9);
        font-size: 15px;
        font-weight: 700;
        color: #caf0f8;
      }
      #veillee-shop-actions button:disabled {
        opacity: 0.4;
      }
      #veillee-ready-btn {
        border-color: rgba(255, 159, 28, 0.7) !important;
        color: #ff9f1c !important;
      }

      /* Game over */
      #veillee-gameover {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
        text-align: center;
        background: rgba(10, 17, 40, 0.82);
      }
      #veillee-gameover h1 {
        font-size: 32px;
        font-weight: 800;
        text-shadow: 0 0 24px rgba(46, 196, 182, 0.35);
      }
      .veillee-score {
        display: flex;
        flex-direction: column;
        gap: 6px;
        width: min(80vw, 320px);
        font-size: 16px;
      }
      .veillee-score > div {
        display: flex;
        justify-content: space-between;
        color: rgba(244, 244, 246, 0.82);
      }
      .veillee-score-total {
        margin-top: 6px;
        padding-top: 8px;
        border-top: 1px solid rgba(202, 240, 248, 0.3);
        font-size: 22px;
        font-weight: 800;
        color: #ff9f1c !important;
      }
      #veillee-replay-btn {
        padding: 12px 26px;
        border: 2px solid rgba(255, 159, 28, 0.7);
        border-radius: 14px;
        background: rgba(255, 159, 28, 0.12);
        color: #ff9f1c;
        font-size: 17px;
        font-weight: 700;
      }

      #veillee-build-stamp {
        position: fixed;
        z-index: 10;
        right: calc(env(safe-area-inset-right, 0px) + 8px);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 6px);
        font-size: 10px;
        color: rgba(244, 244, 246, 0.4);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- Forge mode -->
    <div id="veillee-forge-labels"></div>
    <div id="veillee-trait-panel"></div>

    <!-- Game mode -->
    <div id="veillee-hud">
      <span class="veillee-chip">🗺 <span id="veillee-stat-level">Niv 1/10</span></span>
      <span class="veillee-chip">⬢ <span id="veillee-stat-gold">0</span></span>
      <span class="veillee-chip">♥ <span id="veillee-stat-hp">0</span></span>
      <span class="veillee-chip">⚔ <span id="veillee-stat-field">0/3</span></span>
      <span class="veillee-chip">⏱ <span id="veillee-stat-timer">0:00</span></span>
    </div>
    <div id="veillee-synergies"></div>
    <div id="veillee-phase"></div>
    <div id="veillee-banner"></div>

    <div id="veillee-shop">
      <div id="veillee-shop-offers"></div>
      <div id="veillee-shop-actions">
        <button type="button" id="veillee-reroll-btn">Reroll (1)</button>
        <button type="button" id="veillee-ready-btn">Combat →</button>
      </div>
    </div>

    <div id="veillee-gameover"></div>
    <div id="veillee-build-stamp"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
